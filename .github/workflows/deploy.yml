name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 编译前端
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd frontend && npm ci && npm run build

      # 编译后端（Linux x86_64 二进制）
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      # 推送到服务器
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "target/release/transparentllm,frontend/out"
          target: "/root/transparentllm/"

      # 重启服务
      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/transparentllm
            fuser -k 18400/tcp 2>/dev/null || true
            cp target/release/transparentllm .
            TRANSPARENTLLM_HOST=0.0.0.0 \
            TRANSPARENTLLM_ENCRYPTION_KEY=bf2899b73b3373cd09b84d8017ef9455 \
            TRANSPARENTLLM_PORT=18400 \
            TRANSPARENTLLM_FRONTEND_DIR=/root/transparentllm/frontend/out \
            nohup ./transparentllm > /var/log/transparentllm.log 2>&1 &
            echo "Deployed OK"
