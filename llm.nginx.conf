# TransparentLLM — 前端 UI + API 代理 location 片段

# 拦截 Next.js RSC 预加载请求
location ~ \._PAGE_txt {
    return 204;
}

# 前端静态资源
location /ui/_next {
    alias /usr/share/nginx/llm/_next;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# 前端 UI 静态页面
location /ui {
    alias /usr/share/nginx/llm;
    index index.html;
    try_files $uri $uri.html $uri/ =404;
}

# API 代理到 Rust 后端（正则匹配，优先级高于 k-simulator 的 /api/ 前缀）
location ~ ^/api/(auth|models|providers|playground|stats|logs|settings|source-tags) {
    proxy_pass http://transparentllm:18400;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    # SSE 流式支持：禁用缓冲
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
}

location /v1/ {
    proxy_pass http://transparentllm:18400;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

location = /health {
    proxy_pass http://transparentllm:18400;
    proxy_set_header Host $host;
}

location = / {
    proxy_pass http://transparentllm:18400;
    proxy_set_header Host $host;
}
