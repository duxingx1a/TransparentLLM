services:
  transparentllm:
    image: transparentllm:latest
    container_name: transparentllm
    expose:
      - "18400"
    environment:
      - TRANSPARENTLLM_ENCRYPTION_KEY=change-me-to-32-byte-secret-key!!
      - TRANSPARENTLLM_HOST=0.0.0.0
      - TRANSPARENTLLM_PORT=18400
      - TRANSPARENTLLM_DATABASE_URL=postgres://ydl:870304@8.137.187.63:18432/transparentllm?sslmode=disable
      - TRANSPARENTLLM_LOG_RETENTION_DAYS=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18400/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      transparentllm-pg:
        condition: service_healthy
    networks:
      - default
      - nginx-net

  transparentllm-pg:
    image: postgres:16-alpine
    container_name: transparentllm-pg
    environment:
      - POSTGRES_USER=tlm
      - POSTGRES_PASSWORD=tlm_secret_2024
      - POSTGRES_DB=transparentllm
    volumes:
      - transparentllm-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tlm -d transparentllm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  transparentllm-pgdata:

networks:
  nginx-net:
    external: true
    name: nginx_nginx-net
